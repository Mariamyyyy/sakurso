<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Р’С…РҫРҙ | Gesta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 0 15px;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .login-body {
            padding: 2rem;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #dee2e6;
        }

        .divider span {
            background: white;
            padding: 0 1rem;
            position: relative;
            color: #6c757d;
        }

        .register-link {
            text-align: center;
            margin-top: 1rem;
        }

        .alert-custom {
            border-radius: 10px;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
            
                <h2 class="mb-0">Gesta.бғ’бғ”бғЎбғўбғҗ</h2>
                <p class="mb-0">бғЎбғҳбғЎбғўбғ”бғӣбғҗбғЁбғҳ бғЁбғ”бғЎбғ•бғҡбғҗ</p>
            </div>

            <div class="login-body">
                <div id="alertContainer"></div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email"
                            placeholder="бғЁбғ”бғҳбғ§бғ•бғҗбғңбғ”бғ— бғ”бғҡ.бғӨбғқбғЎбғўбғҗ" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">бғһбғҗбғ бғқбғҡбғҳ</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password"
                            placeholder="бғЁбғ”бғҳбғ§бғ•бғҗбғңбғ”бғ— бғһбғҗбғ бғқбғҡбғҳ" required>
                        <small class="text-muted"> 1-8 бғҗбғЎбғқбғ”бғ‘бғҳ</small>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">бғ“бғҗбғӣбғҗбғ®бғЎбғқбғ•бғ бғ”бғ‘бғҗ </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login w-100 btn-lg"> бғЁбғ”бғЎбғ•бғҡбғҗ</button>
                </form>
                <div class="divider">
                    <span>бғҗбғң</span>
                </div>
                <button id="guestBtn" class="btn btn-outline-secondary w-100 btn-lg"> бғЁбғ”бғЎбғ•бғҡбғҗ бғ бғқбғ’бғқбғ бғӘ бғЎбғўбғЈбғӣбғҗбғ бғҳ</button>

                <div class="register-link">
                    <p class="mb-0">бғҗбғ  бғ’бғҗбғҘбғ•бғ— бғҗбғңбғ’бғҗбғ бғҳбғЁбғҳ? <a href="register.html"
                            class="text-decoration-none fw-bold">бғ“бғҗбғ бғ”бғ’бғҳбғЎбғўбғ бғҳбғ бғ“бғҳбғ—</a></p>
                </div>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-muted text-decoration-none">вҶҗ бғ“бғҗбғ‘бғ бғЈбғңбғ”бғ‘бғҗ бғӣбғ—бғҗбғ•бғҗбғ  бғ’бғ•бғ”бғ бғ“бғ–бғ”</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { addUser } from './js/api.js';

        const form = document.getElementById('loginForm');
        const alertContainer = document.getElementById('alertContainer');
        const guestBtn = document.getElementById('guestBtn');

        // бғЁбғ”бғўбғ§бғқбғ‘бғҳбғңбғ”бғ‘бғҳбғЎ бғ©бғ•бғ”бғңбғ”бғ‘бғҗ
        function showAlert(message, type = 'danger') {
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-custom alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // бғ¬бғҗбғ бғӣбғҗбғўбғ”бғ‘бғҳбғ— бғЁбғ”бғңбғҗбғ®бғ•бғҗ
        function saveUser(user, rememberMe) {
            console.log('Saving user:', user);
            console.log('Remember me:', rememberMe);
            const userString = JSON.stringify(user);
            if (rememberMe) {
                localStorage.setItem('user', userString);
                //бғ•бғЁбғҡбғҳбғ—  sessionStorage бғ—бғЈ бғӣбғқбғӣбғ®бғӣбғҗбғ бғ”бғ‘бғ”бғҡбғҳ
                sessionStorage.removeItem('user');
                console.log('User saved to localStorage');
            } else {
                sessionStorage.setItem('user', userString);
                // бғ•бғЁбғҡбғҳбғ—  localStorage бғ—бғЈ бғӣбғқбғӣбғ®бғӣбғҗбғ бғ”бғ‘бғ”бғҡбғҳ
                localStorage.removeItem('user');
                console.log('User saved to sessionStorage');
            }

            // бғ•бғҗбғӣбғқбғ¬бғӣбғ”бғ‘бғ— бғ бғқбғӣ бғЁбғ”бғҳбғңбғҗбғ®бғҗ
            const savedUser = rememberMe ? localStorage.getItem('user') : sessionStorage.getItem('user');
            console.log('Verification - saved user:', savedUser);

            return !!savedUser;
        }

        // бғҗбғ•бғўбғқбғ бғҳбғ–бғҗбғӘбғҳбғҳбғЎ бғ“бғҗбғӣбғЈбғЁбғҗбғ•бғ”бғ‘бғҗ
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = form.email.value.trim();
            const password = form.password.value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showAlert('бғ’бғ—бғ®бғқбғ•бғ— бғЁбғ”бғҗбғ•бғЎбғқбғ— бғ§бғ•бғ”бғҡбғҗ бғ•бғ”бғҡбғҳ');
                return;
            }
            // бғ”бғӣбғ”бғҳбғҡбғҳбғЎ бғӨбғқбғ бғӣбғҗбғўбғҳбғЎ бғЁбғ”бғӣбғқбғ¬бғӣбғ”бғ‘бғҗ
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('бғ’бғ—бғ®бғқбғ•бғ— бғЁбғ”бғҳбғ§бғ•бғҗбғңбғқбғ— бғЎбғ¬бғқбғ бғҳ email бғӣбғҳбғЎбғҗбғӣбғҗбғ бғ—бғҳ');
                return;
            }

            try {
                // бғӣбғҳбғӣбғ“бғңбғҗбғ бғ”бғқбғ‘бғЎ бғ©бғҗбғўбғ•бғҳбғ бғ—бғ•бғҗ
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.disabled = true;
                submitBtn.textContent = 'бғЁбғ”бғЎбғ•бғҡбғҗ.';

                // бғ бғ”бғҗбғҡбғЈбғ  бғ бғ”бғҹбғӣбғЁбғҳ бғЁбғ”бғҗбғӣбғқбғ¬бғӣбғ”бғ‘бғЎ бғ‘бғҗбғ–бғҗбғЎ
                const user = {
                    name: email.split('@')[0], // бғ•бғҳбғ§бғ”бғңбғ”бғ‘ бғ”бғӣбғ”бғҳбғҡбғҳбғЎ бғңбғҗбғ¬бғҳбғҡбғЎ бғЎбғҗбғ®бғ”бғҡбғҗбғ“
                    email: email,
                    lastLogin: new Date().toISOString(),
                    createdAt: new Date().toISOString()
                };

                // бғӣбғқбғӣбғ®бғӣбғҗбғ бғ”бғ‘бғҡбғҳбғЎ бғЁбғ”бғҘбғӣбғңбғҗ  API
                let savedUser;
                try {
                    savedUser = await addUser(user);
                    console.log('User created via API:', savedUser);
                } catch (error) {
                    console.warn('API failed, creating local user');
                    savedUser = {
                        ...user,
                        id: 'local-' + Date.now().toString()
                    };
                }

                // бғӣбғқбғӣбғ®бғӣбғҗбғ бғ”бғ‘бғҡбғҳбғЎ бғЁбғ”бғңбғҗбғ®бғ•бғҗ
                const success = saveUser(savedUser, rememberMe);

                if (!success) {
                    throw new Error('Failed to save user to storage');
                }

                // бғ¬бғҗбғ бғӣбғҗбғўбғ”бғ‘бғЈбғҡбғҳ бғЁбғ”бғЎбғ•бғҡбғҗ
                showAlert('бғЁбғ”бғЎбғ•бғҡбғҗ бғ“бғҗбғЎбғ бғЈбғҡбғ“бғҗ бғ¬бғҗбғ бғӣбғҗбғўбғ”бғ‘бғҳбғ—. бғ’бғ—бғ®бғқбғ•бғ— бғ“бғҗбғ”бғҡбғқбғ“бғқбғ—...', 'success');

                setTimeout(() => {
                    console.log('Redirecting to profile...');
                    window.location.href = 'profile.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showAlert('бғЁбғ”бғЎбғ•бғҡбғҳбғЎ бғЁбғ”бғӘбғ“бғқбғӣбғҗ.бғЎбғӘбғҗбғ“бғ”бғ— бғ—бғҗбғ•бғҳбғ“бғҗбғң.');

                //бғҰбғҳбғҡбғҗбғҷбғҳбғЎ бғҗбғҰбғ“бғ’бғ”бғңбғҗ
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'бғЁбғ”бғЎбғ•бғҡбғҗ';
            }
        });

        // бғЁбғ”бғЎбғ•бғҡбғҗ бғ бғқбғ’бғқбғ бғӘ бғЎбғўбғӣбғҗбғ бғҳ
        guestBtn.addEventListener('click', () => {
            const guestUser = {
                id: 'guest-' + Date.now(),
                name: 'бғЎбғўбғЈбғӣбғҗбғ бғҳ',
                email: 'guest@example.com',
                isGuest: true,
                createdAt: new Date().toISOString()
            };
            // бғЎбғўбғЈбғӣбғҗбғ бғЎ бғ•бғҳбғңбғҗбғ®бғҗбғ• sessionStorage
            const success = saveUser(guestUser, false);

            if (success) {
                showAlert('бғЁбғ”бғЎбғ•бғҡбғҗ бғЎбғўбғЈбғӣбғҗбғ бғҳбғЎ бғ бғқбғҡбғҳбғ— бғ¬бғҗбғ бғӣбғҗбғўбғ”бғ‘бғҳбғ— бғ“бғҗбғЎбғ бғЈбғҡбғ“бғҗ!', 'success');
                setTimeout(() => {
                    console.log('Redirecting to products...');
                    window.location.href = 'products.html';
                }, 1000);
            } else {
                showAlert('бғЁбғ”бғЎбғ•бғҡбғҳбғЎ бғЁбғ”бғӘбғ“бғқбғӣбғҗ бғЎбғўбғЈбғӣбғ бғҳбғЎ бғ бғқбғҡбғҳбғ—');
            }
        });

        // бғЁбғ”бғӣбғқбғ¬бғӣбғ”бғ‘бғҗ,бғҗбғ бғҳбғЎ бғ—бғЈ бғҗбғ бғҗ бғӣбғқбғӣбғ®бғӣбғҗбғ бғ”бғ‘бғ”бғҡбғҳ бғ“бғҗбғЎбғҗбғ бғ”бғ’бғҳбғЎбғўбғ бғҳбғ бғ”бғ‘бғҡбғҗбғ“
        const existingUserLocal = localStorage.getItem('user');
        const existingUserSession = sessionStorage.getItem('user');
        const existingUser = existingUserLocal || existingUserSession;

        if (existingUser) {
            try {
                const user = JSON.parse(existingUser);
                console.log('User already logged in:', user);

                if (confirm(`бғ—бғҘбғ•бғ”бғң бғЈбғҷбғ•бғ” бғЁбғ”бғЎбғЈбғҡбғҳ бғ®бғҗбғ бғ— ${user.name}. бғ’бғҗбғ“бғҗбғЎбғ•бғҡбғҗ бғһбғ бғқбғӨбғҳбғҡбғЁбғҳ?`)) {
                    window.location.href = 'profile.html';
                }
            } catch (error) {
                console.error('Failed to parse existing user:', error);
                // бғ¬бғҗбғЁбғҡбғҳбғЎ бғ“бғҗбғ–бғҳбғҗбғңбғ”бғ‘бғЈбғҡбғҳ бғӣбғқбғңбғҗбғӘбғ”бғӣбғ”бғ‘бғЎ
                localStorage.removeItem('user');
                sessionStorage.removeItem('user');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
