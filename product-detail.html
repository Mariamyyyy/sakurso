    <style>
        .product-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 10px;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .thumbnail:hover,
        .thumbnail.active {
            border-color: #0d6efd;
        }
        .quantity-input {
            width: 80px;
        }
        .star-rating {
            color: #ffc107;
        }
    </style>
