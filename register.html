<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>რეგისტრაცია| Gesta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      max-width: 450px;
      width: 100%;
      padding: 0 15px;
    }

    .register-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .register-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .register-body {
      padding: 2rem;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .btn-register {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .btn-register:hover {
      background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .login-link {
      text-align: center;
      margin-top: 1rem;
    }
  </style>
  
</head>

<body>

  <div class="register-container">
    <div class="register-card">
      <div class="register-header">
        <div class="logo"></div>
        <h2 class="mb-0">Gesta.გესტა</h2>
        <p class="mb-0">პროფილის შექმნა</p>
      </div>

      <div class="register-body">
        <form id="registrationForm">
          <div class="mb-3">
            <label for="name" class="form-label">სახელი</label>
            <input type="text" class="form-control form-control-lg" id="name" name="name" placeholder="სახელი"
              required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control form-control-lg" id="email" name="email"
              placeholder="შეიყვანეთ იმეილი" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">პაროლი</label>
            <input type="password" class="form-control form-control-lg" id="password" name="password"
              placeholder="შექმენით პაროლი" required>
            <small class="text-muted">1-8 სიმბოლო</small>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="agree" required>
            <label class="form-check-label" for="agree">
              მომხმარებლის პირობებს  ვეთანხმები
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-register w-100 btn-lg">
            დარეგისტრირება
          </button>
        </form>

        <div class="login-link">
          <p class="mb-0">უკვე გაქვთ პროფილი? <a href="login.html" class="text-decoration-none fw-bold">შესვლა</a></p>
        </div>
        <div class="text-center mt-3">
          <a href="index.html" class="text-muted text-decoration-none">← მთავარ გვერდზე დაბრუნება</a>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="js/users.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
